<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌑 Dark DeFi Terminal | Privacy-First Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a2e;
            --border: #1e1e36;
            --purple: #b366ff;
            --cyan: #00fff9;
            --pink: #ff0080;
            --green: #39ff14;
            --yellow: #ffb800;
            --text: #e0e0e0;
            --text2: #a0a0a0;
            --dim: #606060;
        }

        body {
            font-family: 'Courier New', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 249, 0.015) 2px,
                rgba(0, 255, 249, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Layout ── */
        .app { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--surface);
            border-bottom: 2px solid var(--purple);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(179,102,255,0.25);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 6px var(--purple)); }
            to   { filter: brightness(1.3) drop-shadow(0 0 16px var(--cyan)); }
        }

        .brand .sub {
            font-size: 12px;
            color: var(--dim);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .dot.green  { background: var(--green);  box-shadow: 0 0 8px var(--green); }
        .dot.purple { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
        .dot.red    { background: var(--pink);   box-shadow: 0 0 8px var(--pink); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        nav {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            flex-shrink: 0;
        }

        .tab {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text2);
            padding: 10px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.08em;
            transition: all 0.2s;
        }

        .tab:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
        .tab.active { color: var(--purple); border-bottom-color: var(--purple); }

        .main {
            flex: 1;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 0;
        }

        @media (max-width: 1100px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }

        .content-area {
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar {
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px;
            background: var(--surface);
        }

        /* ── Panel ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            color: var(--cyan);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.06em;
        }

        /* ── Chat ── */
        .chat-log {
            height: calc(100vh - 310px);
            min-height: 300px;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-log::-webkit-scrollbar       { width: 6px; }
        .chat-log::-webkit-scrollbar-track { background: var(--bg); }
        .chat-log::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadein 0.25s ease;
        }

        @keyframes fadein { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--dim);
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .avatar.user  { background: var(--purple); }
        .avatar.agent { background: var(--surface2); border: 1px solid var(--cyan); }

        .msg-body {
            background: rgba(255,255,255,0.04);
            border-left: 2px solid var(--border);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            font-size: 13px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-body.user  { border-left-color: var(--purple); }
        .msg-body.agent { border-left-color: var(--cyan); }
        .msg-body.error { border-left-color: var(--pink); color: var(--pink); }

        .msg-body code {
            background: rgba(0,0,0,0.5);
            padding: 1px 5px;
            border-radius: 3px;
            color: var(--green);
            font-size: 12px;
        }

        .provider-badge {
            font-size: 10px;
            background: rgba(0,255,249,0.1);
            color: var(--cyan);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,249,0.2);
        }

        /* ── Input row ── */
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 12px rgba(179,102,255,0.25);
        }

        .send-btn {
            background: var(--purple);
            border: none;
            color: var(--bg);
            padding: 11px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.06em;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--purple);
            transform: translateY(-1px);
        }

        .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(179,102,255,0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Example cards (sidebar) ── */
        .ex-card {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ex-card:hover {
            border-color: var(--purple);
            box-shadow: 0 0 12px rgba(179,102,255,0.18);
        }

        .ex-title { color: var(--cyan); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .ex-desc  { color: var(--text2); font-size: 11px; margin-bottom: 8px; }

        .tags { display: flex; flex-wrap: wrap; gap: 4px; }

        .tag {
            background: rgba(179,102,255,0.15);
            color: var(--purple);
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 10px;
        }

        /* ── Docs ── */
        .doc-block { margin-bottom: 24px; }
        .doc-block h3 { color: var(--cyan); font-size: 15px; margin-bottom: 8px; }
        .doc-block p  { color: var(--text2); font-size: 13px; line-height: 1.65; white-space: pre-line; }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid var(--purple);
            padding: 12px;
            border-radius: 4px;
        }

        .stat-label { color: var(--dim); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 4px; }
        .stat-value { color: var(--cyan); font-size: 20px; font-weight: bold; }

        .act-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .act-btn {
            background: rgba(179,102,255,0.08);
            border: 1px solid var(--purple);
            color: var(--purple);
            padding: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s;
        }

        .act-btn:hover {
            background: rgba(179,102,255,0.18);
            box-shadow: 0 0 12px rgba(179,102,255,0.25);
        }

        /* ── Config panel ── */
        .cfg-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .cfg-row:last-child { border-bottom: none; }
        .cfg-key   { color: var(--text2); }
        .cfg-val   { color: var(--cyan); font-weight: bold; }
        .cfg-ok    { color: var(--green); }
        .cfg-miss  { color: var(--pink); }

        /* ── Perps table ── */
        .perps-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .perps-table th {
            color: var(--dim);
            font-weight: bold;
            letter-spacing: 0.08em;
            padding: 6px 10px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        .perps-table th:first-child { text-align: left; }

        .perps-table td {
            padding: 7px 10px;
            text-align: right;
            border-bottom: 1px solid rgba(30,30,54,0.6);
            font-variant-numeric: tabular-nums;
        }

        .perps-table td:first-child { text-align: left; color: var(--cyan); font-weight: bold; }

        .perps-table tr:hover td { background: rgba(179,102,255,0.06); }

        .pos  { color: var(--green); }
        .neg  { color: var(--pink);  }
        .neu  { color: var(--text2); }

        /* ── Orderbook ── */
        .ob-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .ob-side { font-size: 11px; }
        .ob-side-title { color: var(--dim); letter-spacing: .08em; margin-bottom: 6px; font-size: 10px; }

        .ob-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(30,30,54,0.4);
            font-variant-numeric: tabular-nums;
        }

        .ob-bid .ob-row-price { color: var(--green); }
        .ob-ask .ob-row-price { color: var(--pink);  }

        /* ── Candle spark ── */
        .candle-bar-wrap {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 60px;
            margin-top: 8px;
        }

        .candle-bar {
            flex: 1;
            border-radius: 2px 2px 0 0;
            min-height: 2px;
        }

        /* ── Alert banners ── */
        .banner {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .banner.warn  { background: rgba(255,184,0,0.1);  border: 1px solid var(--yellow); color: var(--yellow); }
        .banner.error { background: rgba(255,0,128,0.1);  border: 1px solid var(--pink);   color: var(--pink); }
        .banner.ok    { background: rgba(57,255,20,0.1);  border: 1px solid var(--green);  color: var(--green); }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Header ── -->
    <header>
        <div class="brand">
            <h1>🌑 DARK DEFI TERMINAL</h1>
            <span class="sub">Privacy-First Trading on Solana</span>
        </div>
        <div class="status-bar" id="statusBar">
            <div class="status-pill">
                <div class="dot yellow" id="serverDot"></div>
                <span id="serverLabel">connecting…</span>
            </div>
            <div class="status-pill">
                <div class="dot purple" id="aiDot"></div>
                <span id="aiLabel">AI: …</span>
            </div>
            <div class="status-pill">
                <div class="dot green" id="netDot"></div>
                <span id="netLabel">devnet</span>
            </div>
        </div>
    </header>

    <!-- ── Nav tabs ── -->
    <nav>
        <button class="tab active" data-tab="agent">🤖 AI AGENT</button>
        <button class="tab" data-tab="perps">📈 PERPS</button>
        <button class="tab" data-tab="docs">📚 DOCS</button>
        <button class="tab" data-tab="stats">📊 STATS</button>
        <button class="tab" data-tab="config">⚙️ CONFIG</button>
    </nav>

    <!-- ── Main layout ── -->
    <div class="main">
        <div class="content-area" id="contentArea">
            <!-- injected by JS -->
        </div>
        <aside class="sidebar" id="sidebar">
            <!-- injected by JS -->
        </aside>
    </div>

</div>

<script>
// ─────────────────────────────────────────────────
// Config & state
// ─────────────────────────────────────────────────
const API_BASE = window.location.origin; // hits the local server
let serverConfig = null;
let chatHistory = []; // [{role,content}]

// ─────────────────────────────────────────────────
// Boot — fetch server config
// ─────────────────────────────────────────────────
async function boot() {
    try {
        const r = await fetch(API_BASE + '/api/config');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        serverConfig = await r.json();

        // Update status bar
        document.getElementById('serverDot').className = 'dot green';
        document.getElementById('serverLabel').textContent = 'server: online';
        document.getElementById('netLabel').textContent = serverConfig.network ?? 'devnet';

        const aiOk = serverConfig.hasGoogleAI || serverConfig.hasXAI || serverConfig.hasRedPill;
        document.getElementById('aiDot').className = 'dot ' + (aiOk ? 'green' : 'yellow');
        document.getElementById('aiLabel').textContent = aiOk
            ? (serverConfig.hasGoogleAI ? 'Gemini' : serverConfig.hasXAI ? 'Grok' : 'RedPill')
            : 'AI: fallback';

    } catch (e) {
        document.getElementById('serverDot').className = 'dot red';
        document.getElementById('serverLabel').textContent = 'server: offline';
        document.getElementById('aiDot').className = 'dot red';
        document.getElementById('aiLabel').textContent = 'AI: unavailable';
        console.warn('Cannot reach local server:', e.message);
    }

    renderTab(currentTab);
}

// ─────────────────────────────────────────────────
// Tab routing
// ─────────────────────────────────────────────────
let currentTab = 'agent';

document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        renderTab(currentTab);
    });
});

function renderTab(tab) {
    const content = document.getElementById('contentArea');
    const sidebar = document.getElementById('sidebar');

    if (tab === 'agent') {
        content.innerHTML = buildAgentTab();
        sidebar.innerHTML = buildSidebar();
        bindChatEvents();
        scrollChatToBottom();
    } else if (tab === 'perps') {
        content.innerHTML = buildPerpsTab();
        sidebar.innerHTML = buildPerpsSidebar();
        loadPerpsData();
    } else if (tab === 'docs') {
        content.innerHTML = buildDocsTab();
        sidebar.innerHTML = '';
    } else if (tab === 'stats') {
        content.innerHTML = buildStatsTab();
        sidebar.innerHTML = buildPrivacyPanel();
    } else if (tab === 'config') {
        content.innerHTML = buildConfigTab();
        sidebar.innerHTML = '';
    }
}

// ─────────────────────────────────────────────────
// Chat tab
// ─────────────────────────────────────────────────
const INITIAL_MESSAGE = {
    role: 'agent',
    content: `🌑 Dark DeFi Agent online.

I'm your privacy-first DeFi assistant with deep knowledge of the Dark Protocol on Solana.

Ask me about:
• Shielded wallets & Zcash cryptography
• Private transfers & note encryption
• FHE encrypted trading & dark pools
• TEE-secured AI agents
• Cross-chain bridges (ETH → Solana)
• Viewing keys & compliance

Or click an example in the sidebar →`,
    time: new Date()
};

if (chatHistory.length === 0) chatHistory.push(INITIAL_MESSAGE);

function buildAgentTab() {
    const msgs = chatHistory.map(m => renderMsg(m)).join('');
    return `
    <div class="panel" style="height: calc(100vh - 170px); display:flex; flex-direction:column;">
        <div class="panel-header">
            <div class="panel-title">🤖 Dark DeFi Agent</div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="provider-badge" id="provBadge">-</span>
                <div class="dot green"></div>
                <span style="font-size:11px;color:var(--dim)">ONLINE</span>
            </div>
        </div>
        <div class="chat-log" id="chatLog">${msgs}</div>
        <div class="input-row">
            <input type="text" class="chat-input" id="chatInput"
                   placeholder="Ask about Dark Protocol…" autocomplete="off"/>
            <button class="send-btn" id="sendBtn">SEND</button>
        </div>
    </div>`;
}

function renderMsg(m) {
    const isAgent = m.role === 'agent';
    const name = isAgent ? 'Dark Agent' : 'You';
    const avatarEmoji = isAgent ? '🌑' : '👤';
    const cls = m.error ? 'error' : m.role;
    const time = m.time ? new Date(m.time).toLocaleTimeString() : '';
    const badge = m.provider ? `<span class="provider-badge">${m.provider}</span>` : '';
    return `
    <div class="msg">
        <div class="msg-header">
            <div class="avatar ${m.role}">${avatarEmoji}</div>
            <strong style="font-size:12px;color:var(--text2)">${name}</strong>
            <span>${time}</span>
            ${badge}
        </div>
        <div class="msg-body ${cls}">${escHtml(m.content)}</div>
    </div>`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function scrollChatToBottom() {
    const log = document.getElementById('chatLog');
    if (log) log.scrollTop = log.scrollHeight;
}

function bindChatEvents() {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    if (!input || !btn) return;

    btn.addEventListener('click', doSend);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
}

async function doSend() {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    const log = document.getElementById('chatLog');
    if (!input || !btn || !log) return;

    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    chatHistory.push({ role: 'user', content: text, time: new Date() });

    // Append user message
    const userEl = document.createElement('div');
    userEl.innerHTML = renderMsg(chatHistory.at(-1));
    log.appendChild(userEl.firstElementChild);
    scrollChatToBottom();

    // Thinking placeholder
    const thinkEl = document.createElement('div');
    thinkEl.className = 'msg';
    thinkEl.id = 'thinking';
    thinkEl.innerHTML = `
        <div class="msg-header">
            <div class="avatar agent">🌑</div>
            <strong style="font-size:12px;color:var(--text2)">Dark Agent</strong>
            <span class="spinner"></span>
        </div>
        <div class="msg-body agent">Thinking…</div>`;
    log.appendChild(thinkEl);
    scrollChatToBottom();

    // Build messages for API
    const systemContent = `You are the Dark DeFi Agent — an expert on the Dark Protocol, a privacy-first DeFi metaprotocol on Solana.

Your expertise covers:
- Zcash Sapling cryptography ported to Solana (zk-SNARKs, Pedersen commitments, nullifiers)
- Fully Homomorphic Encryption (FHE) for encrypted DeFi computations
- Shielded wallets with unlimited diversified addresses (ZIP-32 HD derivation)
- Private transfers using ChaCha20-Poly1305 note encryption
- Dark pools with MEV-resistant order matching
- Encrypted assets: eSOL, eBTC, eETH, eUSDC
- TEE-secured AI agents with on-chain attestation
- Cross-chain bridges (Ethereum, Bitcoin → Solana)
- View keys and selective disclosure for compliance

Be precise, technical but accessible. Include TypeScript code snippets when helpful. Always emphasize privacy guarantees.`;

    const apiMessages = [
        { role: 'system', content: systemContent },
        ...chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10).map(m => ({
            role: m.role === 'agent' ? 'assistant' : 'user',
            content: m.content
        }))
    ];

    try {
        const r = await fetch(API_BASE + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: apiMessages })
        });

        const data = await r.json();
        const agentMsg = {
            role: 'agent',
            content: data.reply ?? data.error ?? 'No response.',
            provider: data.provider,
            error: !!data.error && !data.reply,
            time: new Date()
        };
        chatHistory.push(agentMsg);

        // Update provider badge
        const badge = document.getElementById('provBadge');
        if (badge && data.provider) badge.textContent = data.provider;

        // Replace thinking with real reply
        thinkEl.innerHTML = renderMsg(agentMsg);
        thinkEl.removeAttribute('id');

    } catch (e) {
        const errMsg = { role: 'agent', content: '⚠️ Network error: ' + e.message, error: true, time: new Date() };
        chatHistory.push(errMsg);
        thinkEl.innerHTML = renderMsg(errMsg);
        thinkEl.removeAttribute('id');
    }

    scrollChatToBottom();
    btn.disabled = false;
    btn.innerHTML = 'SEND';
    input.focus();
}

function fmt(n, decimals=2) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtK(n) {
    if (!n) return '—';
    if (n >= 1e9) return '$' + fmt(n/1e9,2) + 'B';
    if (n >= 1e6) return '$' + fmt(n/1e6,2) + 'M';
    if (n >= 1e3) return '$' + fmt(n/1e3,2) + 'K';
    return '$' + fmt(n,2);
}

function fmtFunding(rate) {
    if (!rate) return '—';
    const apr = rate * 24 * 365 * 100;
    return (apr >= 0 ? '+' : '') + apr.toFixed(4) + '% APR';
}

function changeClass(pct) {
    if (!pct) return 'neu';
    return pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'neu';
}

function renderMarketsTable(tickers) {
    if (!tickers || tickers.length === 0) {
        return '<div style="color:var(--pink);font-size:12px;padding:12px;">⚠️ No market data available. Is the server running?</div>';
    }
    const rows = tickers.map(t => {
        const chg = t.change24hPct ?? 0;
        const cls = changeClass(chg);
        return `
        <tr onclick="selectPerpsSymbol('${t.symbol}')" style="cursor:pointer;">
            <td>${t.symbol}</td>
            <td>$${fmt(t.markPrice, t.markPrice > 100 ? 2 : 4)}</td>
            <td class="${cls}">${chg >= 0 ? '+' : ''}${fmt(chg,2)}%</td>
            <td>${fmtK(t.volume24hUsd)}</td>
            <td>${fmtK(t.openInterest * t.markPrice)}</td>
            <td class="${t.fundingRate >= 0 ? 'pos' : 'neg'}">${fmtFunding(t.fundingRate)}</td>
        </tr>`;
    }).join('');

    return `
    <table class="perps-table">
        <thead>
            <tr>
                <th>MARKET</th>
                <th>MARK PRICE</th>
                <th>24H %</th>
                <th>24H VOLUME</th>
                <th>OPEN INT.</th>
                <th>FUNDING APR</th>
            </tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>
    <div style="font-size:10px;color:var(--dim);margin-top:8px;">Click a row to view orderbook & candles</div>`;
}

async function loadPerpsData() {

        for (const t of (perpsData.tickers ?? [])) {

async function selectPerpsSymbol(sym) {

        fetch(`${API_BASE}/api/perps/candles?symbol=${sym}&interval=1h&limit=24`).then(r => r.json()),

function renderOrderbook(book) {
    if (!book || (!book.bids?.length && !book.asks?.length)) {
        return '<div style="color:var(--dim);font-size:12px;">No orderbook data</div>';
    }
    const bidsHtml = (book.bids ?? []).slice(0,8).map(l => `
        <div class="ob-row">
            <span class="ob-row-price">${fmt(l.price,4)}</span>
            <span style="color:var(--text2);">${fmt(l.quantity,4)}</span>
        </div>`).join('');

    const asksHtml = (book.asks ?? []).slice(0,8).map(l => `
        <div class="ob-row">
            <span class="ob-row-price">${fmt(l.price,4)}</span>
            <span style="color:var(--text2);">${fmt(l.quantity,4)}</span>
        </div>`).join('');

    const mid = book.midPrice ? `$${fmt(book.midPrice,4)}` : '—';
    const spread = book.spread ? `${fmt(book.spread,4)}` : '—';

    return `
    <div class="ob-side ob-bid">
        <div class="ob-side-title">🟢 BIDS (buy)</div>
        ${bidsHtml || '<div style="color:var(--dim);font-size:11px;">none</div>'}
    </div>
    <div class="ob-side ob-ask">
        <div class="ob-side-title">🔴 ASKS (sell)</div>
        ${asksHtml || '<div style="color:var(--dim);font-size:11px;">none</div>'}
    </div>
    <div style="grid-column:span 2;padding-top:8px;font-size:11px;color:var(--dim);">
        Mid: <span style="color:var(--cyan);">${mid}</span>
        &nbsp;|&nbsp; Spread: <span style="color:var(--yellow);">${spread}</span>
    </div>`;
}

function renderCandleBar(candles) {
    if (!candles || candles.length === 0) return '<div style="color:var(--dim);font-size:11px;">No candle data</div>';
    const highs = candles.map(c => Number(c.high) || 0);
    const lows  = candles.map(c => Number(c.low)  || 0);
    const maxH  = Math.max(...highs);
    const minL  = Math.min(...lows);
    const range = maxH - minL || 1;

    return candles.map(c => {
        const open  = Number(c.open)  || 0;
        const close = Number(c.close) || 0;
        const high  = Number(c.high)  || 0;
        const low   = Number(c.low)   || 0;
        const bull  = close >= open;
        const heightPct = Math.max(((high - low) / range) * 100, 4);
        const color = bull ? 'var(--green)' : 'var(--pink)';
        const title = `O:${fmt(open,2)} H:${fmt(high,2)} L:${fmt(low,2)} C:${fmt(close,2)}\n${c.time ?? ''}`;
        return `<div class="candle-bar" title="${title}" style="height:${heightPct}%;background:${color};opacity:0.8;"></div>`;
    }).join('');
}
