<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark DeFi Terminal | Privacy-First Trading</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --terminal-bg: #0a0a0f;
            --terminal-surface: #12121a;
            --terminal-border: #1a1a2e;
            --neon-purple: #b366ff;
            --neon-cyan: #00fff9;
            --neon-pink: #ff0080;
            --neon-green: #39ff14;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-dim: #606060;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--terminal-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                transparent 50%,
                rgba(0, 255, 249, 0.02) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .terminal-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .terminal-header {
            background: var(--terminal-surface);
            border: 2px solid var(--neon-purple);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(179, 102, 255, 0.3);
        }

        .terminal-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(179, 102, 255, 0.5);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 10px var(--neon-purple)); }
            to { filter: brightness(1.2) drop-shadow(0 0 20px var(--neon-cyan)); }
        }

        .terminal-subtitle {
            color: var(--neon-cyan);
            font-size: 14px;
        }

        .terminal-nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
            font-size: 12px;
        }

        .nav-btn:hover {
            background: var(--neon-purple);
            color: var(--terminal-bg);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .nav-btn.active {
            background: var(--neon-purple);
            color: var(--terminal-bg);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .terminal-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .terminal-content {
                grid-template-columns: 1fr;
            }
        }

        .terminal-panel {
            background: var(--terminal-surface);
            border: 1px solid var(--terminal-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--terminal-border);
        }

        .panel-title {
            color: var(--neon-cyan);
            font-size: 16px;
            font-weight: bold;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--terminal-bg);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 4px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .message-avatar.user {
            background: var(--neon-purple);
        }

        .message-avatar.agent {
            background: var(--neon-cyan);
        }

        .message-name {
            font-weight: bold;
            font-size: 12px;
        }

        .message-time {
            color: var(--text-dim);
            font-size: 10px;
        }

        .message-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 4px;
            border-left: 2px solid var(--neon-purple);
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message-content.agent {
            border-left-color: var(--neon-cyan);
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--neon-green);
            font-size: 12px;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--terminal-border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(179, 102, 255, 0.3);
        }

        .send-btn {
            background: var(--neon-purple);
            border: none;
            color: var(--terminal-bg);
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .send-btn:hover {
            box-shadow: 0 0 20px var(--neon-purple);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .code-example {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--terminal-border);
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .code-example pre {
            margin: 0;
            font-size: 12px;
            line-height: 1.5;
            color: var(--neon-green);
        }

        .example-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--terminal-border);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .example-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(179, 102, 255, 0.2);
        }

        .example-title {
            color: var(--neon-cyan);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .example-description {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .example-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(179, 102, 255, 0.2);
            color: var(--neon-purple);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 4px;
            border-left: 3px solid var(--neon-purple);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: var(--neon-cyan);
            font-size: 24px;
            font-weight: bold;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            background: rgba(179, 102, 255, 0.1);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(179, 102, 255, 0.2);
            box-shadow: 0 0 10px rgba(179, 102, 255, 0.3);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(179, 102, 255, 0.3);
            border-top-color: var(--neon-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 0, 128, 0.1);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 12px;
        }

        .success-message {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 12px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .doc-section {
            margin-bottom: 20px;
        }

        .doc-section h3 {
            color: var(--neon-cyan);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .doc-section p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .doc-section ul {
            list-style: none;
            padding-left: 20px;
        }

        .doc-section li {
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-size: 13px;
        }

        .doc-section li:before {
            content: "▹ ";
            color: var(--neon-purple);
            font-weight: bold;
        }
    </style>
</head>
